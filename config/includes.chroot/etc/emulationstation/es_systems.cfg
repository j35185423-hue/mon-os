<systemList>

  <system>
    <name>streaming</name>
    <fullname>Streaming</fullname>
    <path>/home/user/roms/streaming</path>
    <extension>.url</extension>
    <command>chromium --kiosk --app=%ROM%</command>
    <platform>streaming</platform>
    <theme>streaming</theme>
  </system>

  <system>
    <name>ps2</name>
    <fullname>PlayStation 2</fullname>
    <path>/home/user/roms/ps2</path>
    <extension>.iso .ISO .bin .BIN</extension>
    <command>pcsx2 %ROM%</command>
    <platform>ps2</platform>
    <theme>ps2</theme>
  </system>

  <system>
    <name>raccourcis</name>
    <fullname>Mes Raccourcis</fullname>
    <path>/home/user/roms/raccourcis</path>
    <extension>.url</extension>
    <command>chromium --kiosk --app=%ROM%</command>
    <platform>raccourcis</platform>
    <theme>raccourcis</theme>
  </system>

</systemList>
